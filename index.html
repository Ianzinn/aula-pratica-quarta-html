<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ian Pedro Barbosa</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #ffffff 0%, #f5f5f7 100%);
      color: #1d1d1f;
    }

    .container {
      max-width: 900px;
      margin: 80px auto;
      padding: 50px 25px;
      text-align: center;
    }

    img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    img:hover {
      transform: scale(1.05);
    }

    h1 {
      font-size: 44px;
      font-weight: 600;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      color: #6e6e73;
      max-width: 620px;
      margin: 0 auto 35px auto;
    }

    .divider {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, #0071e3, #42a5f5);
      margin: 40px auto;
      border-radius: 10px;
    }

    h2 {
      font-size: 24px;
      font-weight: 500;
      margin-bottom: 25px;
    }

    ul {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      padding: 0;
    }

    li {
      background: #ffffff;
      padding: 12px;
      border-radius: 10px;
      font-size: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      transition: all 0.2s ease;
    }

    li:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    .links {
      margin-top: 30px;
    }

    a {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      border-radius: 8px;
      background: #0071e3;
      color: white;
      text-decoration: none;
      font-size: 15px;
      transition: all 0.2s ease;
    }

    a:hover {
      background: #005bb5;
      transform: translateY(-2px);
    }

    .fade {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>

<body>

  <div class="container fade">

    <img src="foto2.jpeg" alt="Foto de Perfil">

    <h1>Ian Pedro Barbosa</h1>

    <p>
      Desenvolvedor mobile focado em Flutter, criando aplicações modernas,
      performáticas e com excelente experiência do usuário.
    </p>

    <div class="divider"></div>

    <h2>Habilidades</h2>
    <ul>
      <li>Flutter</li>
      <li>Dart</li>
      <li>JavaScript</li>
      <li>HTML & CSS</li>
      <li>APIs REST</li>
      <li>Git & GitHub</li>
    </ul>

    <div class="divider"></div>

    <h2>Links</h2>
    <div class="links">
      <a href="https://github.com/Ianzinn" target="_blank">GitHub</a>
      <a href="https://www.linkedin.com/in/ian-pedro-barbosa-de-santana-8a81ab307" target="_blank">LinkedIn</a>
    </div>

  </div>

</body>
</html>
